services:
- type: web
  name: spotify-mcp-poke
  runtime: docker
  plan: free
  autoDeploy: true
  envVars:
  - key: SPOTIFY_CLIENT_ID
    sync: false
  - key: SPOTIFY_CLIENT_SECRET
    sync: false
  - key: SPOTIFY_TOKEN_CACHE
    value: /app/.spotify_cache
  - key: TRANSPORT
    value: streamable-http
  - key: PORT
    value: "8247"
